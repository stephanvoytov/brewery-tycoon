<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пивоваренный Тайкун</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍺</text></svg>">
</head>
<body>
    <!-- Auth Screen -->
    <div id="screen-auth" class="screen active">
        <div class="auth-container">
            <div class="auth-box">
                <h1>🍺 Пивоваренный Тайкун</h1>
                <p class="auth-subtitle">Экономическая стратегия</p>

                <div class="auth-tabs">
                    <button class="auth-tab active" data-form="loginForm">Вход</button>
                    <button class="auth-tab" data-form="regForm">Регистрация</button>
                </div>

                <div id="loginForm" class="auth-form active">
                    <input type="text" id="loginUsername" placeholder="Имя пользователя" maxlength="20">
                    <input type="password" id="loginPassword" placeholder="Пароль (мин. 6 символов)">
                    <button id="loginBtn" class="btn btn-primary">Войти</button>
                </div>

                <div id="regForm" class="auth-form">
                    <input type="text" id="regUsername" placeholder="Имя пользователя" maxlength="20">
                    <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)">
                    <input type="password" id="regConfirm" placeholder="Повторите пароль">
                    <button id="registerBtn" class="btn btn-primary">Зарегистрироваться</button>
                </div>

                <div class="auth-divider"><span>или</span></div>
                <button id="guestBtn" class="btn btn-secondary">Продолжить без регистрации</button>
            </div>
        </div>
    </div>

    <!-- Saves Screen -->
    <div id="screen-saves" class="screen">
        <div class="saves-container">
            <h1>🍺 Ваши пивоварни</h1>
            <div id="savesList" class="saves-list"></div>
            <button class="btn btn-primary" onclick="startNewGame()">➕ Новая пивоварня</button>
            <button class="btn btn-secondary" onclick="doLogout()" style="margin-top: 8px; width: auto; padding: 8px 24px;">Выйти</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="screen-game" class="screen">
        <div class="app">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h1>🍺 ПивТайкун</h1>
                    <div class="game-id-bar">
                        ID: <span id="gameIdDisplay">—</span>
                    </div>
                    <div id="userInfo" style="display:none;" class="user-info-bar">
                        <div class="user-info-row">
                            <span class="username">👤 <span id="usernameDisplay"></span></span>
                            <button class="btn btn-small" onclick="showSaves()">💾 Сохранения</button>
                            <button class="btn btn-small" onclick="doLogout()">✕ Выйти</button>
                        </div>
                    </div>
                    <div id="guestInfo" class="user-info-bar">
                        <div class="user-info-row">
                            <span class="username">👤 Гость</span>
                            <button class="btn btn-small" onclick="showScreen('screen-auth'); updateSidebarUser();">🔑 Войти</button>
                        </div>
                    </div>
                </div>
                <nav class="sidebar-nav">
                    <button class="nav-btn active" data-page="dashboard">📊 Дашборд</button>
                    <button class="nav-btn" data-page="brewing">🍺 Производство</button>
                    <button class="nav-btn" data-page="market">💰 Рынок</button>
                    <button class="nav-btn" data-page="management">🏢 Управление</button>
                    <button class="nav-btn" data-page="leaderboard">🏆 Лидерборд</button>
                    <button class="nav-btn" data-page="help">❓ Помощь</button>
                </nav>
                <div class="sidebar-footer">
                    <div class="currency-bar">
                        <label>Валюта:</label>
                        <select id="currencySelect" onchange="doChangeCurrency(this.value)">
                            <option value="$">$ USD</option>
                            <option value="€">€ EUR</option>
                            <option value="₽">₽ RUB</option>
                            <option value="£">£ GBP</option>
                            <option value="¥">¥ JPY</option>
                        </select>
                    </div>
                    <button class="btn btn-newgame" onclick="startNewGame()">🔄 Новая игра</button>
                </div>
            </aside>

            <main class="main-content">
                <div id="statusBar"></div>
                <div id="pageContent"></div>
            </main>
        </div>

        <!-- Bottom Navigation (mobile only) -->
        <nav class="bottom-nav" id="bottomNav">
            <button class="bottom-nav-btn active" data-page="dashboard"><span class="bn-icon">📊</span>Дашборд</button>
            <button class="bottom-nav-btn" data-page="brewing"><span class="bn-icon">🍺</span>Варка</button>
            <button class="bottom-nav-btn" data-page="market"><span class="bn-icon">💰</span>Рынок</button>
            <button class="bottom-nav-btn" data-page="management"><span class="bn-icon">🏢</span>Управл.</button>
            <button class="bottom-nav-btn" data-page="more"><span class="bn-icon">⋯</span>Ещё</button>
        </nav>

        <!-- Hamburger / Mobile menu overlay -->
        <button class="hamburger-btn" id="hamburgerBtn">☰</button>
        <div class="mobile-menu" id="mobileMenu">
            <button class="nav-btn" data-page="dashboard">📊 Дашборд</button>
            <button class="nav-btn" data-page="brewing">🍺 Производство</button>
            <button class="nav-btn" data-page="market">💰 Рынок</button>
            <button class="nav-btn" data-page="management">🏢 Управление</button>
            <button class="nav-btn" data-page="leaderboard">🏆 Лидерборд</button>
            <button class="nav-btn" data-page="help">❓ Помощь</button>
            <hr style="border-color:var(--border);margin:12px 0">
            <div class="currency-bar">
                <label>Валюта:</label>
                <select id="currencySelectMobile" onchange="doChangeCurrency(this.value)">
                    <option value="$">$ USD</option>
                    <option value="€">€ EUR</option>
                    <option value="₽">₽ RUB</option>
                    <option value="£">£ GBP</option>
                    <option value="¥">¥ JPY</option>
                </select>
            </div>
            <button class="btn btn-newgame" onclick="startNewGame()" style="margin-top:8px">🔄 Новая игра</button>
            <button class="btn btn-secondary" onclick="showSaves()" style="margin-top:8px">💾 Сохранения</button>
            <div id="mobileUserInfo"></div>
        </div>

        <div id="tutorialOverlay" style="display:none">
            <div id="tutorialBackdrop"></div>
            <div id="tutorialBox">
                <div id="tutorialStep"></div>
                <div id="tutorialNav">
                    <button class="btn btn-secondary" id="tutorialSkip">Пропустить</button>
                    <div id="tutorialDots"></div>
                    <button class="btn btn-primary" id="tutorialNext">Далее →</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils/constants.js"></script>
    <script src="js/utils/toast.js"></script>
    <script src="js/utils/dialogs.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components/tutorial.js"></script>
    <script src="js/components/leaderboard.js"></script>
    <script src="js/components/saves.js"></script>
    <script src="js/components/help.js"></script>
    <script src="js/components/dashboard.js"></script>
    <script src="js/components/brewery.js"></script>
    <script src="js/components/recipes.js"></script>
    <script src="js/components/batches.js"></script>
    <script src="js/components/inventory.js"></script>
    <script src="js/components/market.js"></script>
    <script src="js/components/market-page.js"></script>
    <script src="js/components/staff.js"></script>
    <script src="js/components/research.js"></script>
    <script src="js/components/finance.js"></script>
    <script src="js/components/brewing.js"></script>
    <script src="js/components/management.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
